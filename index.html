<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Intelligence & Tech - בקרוב</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }
        .company-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 1rem;
            color: #6c757d;
            margin-bottom: 30px;
        }
        .divider {
            height: 1px;
            background: #e9ecef;
            width: 80px;
            margin: 0 auto 30px auto;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #111;
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
            color: #495057;
        }
        .status-badge {
            background-color: #e2e8f0;
            color: #4a5568;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 25px;
        }
        .subscribe-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        input[type="email"] {
            padding: 14px 20px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            width: 260px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="email"]:focus {
            border-color: #000;
        }
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #333;
        }
        footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-title">Human Intelligence & Tech</div>
        <div class="tagline">AI-Driven Systems</div>
        <div class="divider"></div>
        
        <div class="status-badge">האתר בהקמה</div>
        <h1>אינטרקום בבינה מלאכותית</h1>
        <p>מערכת אינטרקום חכמה המשלבת בינה מלאכותית מתקדמת לניהול, מענה וביטחון בסטנדרט חדש.</p>
        
        <form class="subscribe-form">
            <input type="email" placeholder="כתובת האימייל שלך..." required>
            <button type="submit">עדכנו אותי בהשקה</button>
        </form>

        <footer>
            © 2026 Human Intelligence & Tech. All rights reserved.
        </footer>
    </div>
</body>
</html>
