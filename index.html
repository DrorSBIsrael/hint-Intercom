<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Intelligence & Tech - בקרוב</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            position: relative;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }
        .company-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #1a1a1a;
            margin-bottom: 8px;
            text-transform: uppercase;
            cursor: pointer; /* הופך את הכותרת ללחיצה */
            user-select: none; /* מונע סימון כחול של הטקסט בלחיצה */
        }
        .tagline { font-size: 1rem; color: #6c757d; margin-bottom: 30px; user-select: none; }
        .divider { height: 1px; background: #e9ecef; width: 80px; margin: 0 auto 30px auto; }
        h1 { font-size: 2.2rem; margin-bottom: 15px; color: #111; }
        p { font-size: 1.1rem; margin-bottom: 35px; line-height: 1.6; color: #495057; }
        .status-badge {
            background-color: #e2e8f0;
            color: #4a5568;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 25px;
        }
        .subscribe-form { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input[type="email"] {
            padding: 14px 20px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            width: 260px;
            font-size: 1rem;
            outline: none;
        }
        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        footer { margin-top: 60px; font-size: 0.85rem; color: #adb5bd; }
        
        .secret-panel-btn {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: #dc3545;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 9999;
        }
        .secret-panel-btn:hover { background-color: #bd2130; }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-title" id="companyLogo">Human Intelligence & Tech</div>
        <div class="tagline">AI-Driven Systems</div>
        <div class="divider"></div>
        <div class="status-badge">האתר בהקמה</div>
        <h1>אינטרקום בבינה מלאכותית</h1>
        <p>מערכת אינטרקום חכמה המשלבת בינה מלאכותית מתקדמת לניהול, מענה וביטחון בסטנדרט חדש.</p>
        
        <form class="subscribe-form" id="leadForm">
            <input type="email" id="emailInput" placeholder="כתובת האימייל שלך..." required>
            <button type="submit" id="submitBtn">עדכנו אותי בהשקה</button>
        </form>
        <footer>© 2026 Human Intelligence & Tech. All rights reserved.</footer>
    </div>

    <a href="admin.html" class="secret-panel-btn" id="secretBtn">🛠️ כניסה לכלי ניהול DB</a>

    <script>
    // 1. מנגנון שליחת טופס לידים לשרת ב-Render
    document.getElementById('leadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const emailInput = document.getElementById('emailInput');
        const submitBtn = document.getElementById('submitBtn');
        
        submitBtn.innerText = 'שולח...';
        submitBtn.disabled = true;
        
        try {
            const response = await fetch('https://hint-intercom-backend.onrender.com/leads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailInput.value })
            });
            if (response.ok) {
                alert('תודה רבה! נשמור על קשר.');
                emailInput.value = '';
            } else {
                alert('אופס, השרת החזיר שגיאה 500. בדוק את פרטי ה-SMTP והסיסמה ב-Render.');
            }
        } catch (error) {
            alert('שגיאת תקשורת. ודא שהשרת ב-Render פעיל ומגיב.');
        } finally {
            submitBtn.innerText = 'עדכנו אותי בהשקה';
            submitBtn.disabled = false;
        }
    });

    // 2. מנגנון סודי חדש: לחיצה כפולה על שם החברה חושפת את הלחצן
    document.getElementById('companyLogo').addEventListener('dblclick', () => {
        const secretBtn = document.getElementById('secretBtn');
        secretBtn.style.display = 'block';
        alert('גישת מנהל הופעלה בהצלחה! הלחצן האדום מופיע בפינה השמאלית למטה.');
    });
    </script>
</body>
</html>
