<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarter Intercom Dashboard</title>
    <link id="theme-stylesheet" rel="stylesheet" href="style.css?v=113">
    <link rel="stylesheet" href="mobile.css?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Translations -->
    <script src="translations.js"></script>
    <!-- Security / DevTools Block -->
    <script src="security.js?v=2"></script>
    <!-- Flatpickr Datepicker -->
                </head>
<body class="dark-mode" id="app-body">

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <!-- Fixed Global Logo -->
        <img src="assets/images/LOGO.jpg" alt="Logo" class="top-left-logo">
        <div class="login-right">
            <img src="assets/images/background.png" alt="Background" class="bg-img">
        </div>
        <div class="login-left">
            <div class="login-box">
                <h1 data-i18n="login_title">התחברות</h1>
                <form id="login-form">
                    <div class="input-group">
                        <label for="username" data-i18n="username_lbl">שם משתמש</label>
                        <input type="text" id="username" autocomplete="username" required pattern="^[a-zA-Z0-9@_\-.]+$" title="שם המשתמש יכול להכיל אותיות, מספרים, וסימנים: @ _ - .">
                    </div>
                    <div class="input-group">
                        <label for="password" data-i18n="password_lbl">סיסמא</label>
                        <input type="password" id="password" autocomplete="current-password" required pattern="^[a-zA-Z0-9@_\-.]+$" title="הסיסמא יכולה להכיל אותיות, מספרים, וסימנים: @ _ - .">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember-me">
                        <label for="remember-me">זכור אותי בכניסה</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; font-size: 1.1rem; padding: 12px; border-radius: 8px;">כניסה</button>
                </form>
                <div id="login-error" class="error-msg"></div>
            </div>
        </div>
    </div>

    <!-- 2FA Screen -->
    <div id="two-fa-screen" class="screen">
        <div class="two-fa-box" style="position: relative;">
            <button id="close-2fa-btn" title="חזור להתחברות" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer;">&times;</button>
            <h2 data-i18n="two_fa_title">אימות דו-שלבי</h2>
            <p data-i18n="two_fa_desc">הזן את הקוד בן 6 הספרות שנשלח אליך ב-WhatsApp</p>
            <div class="two-fa-inputs" id="two-fa-inputs">
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input" autofocus>
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
                <input type="text" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="code-input">
            </div>
            <div id="two-fa-error" class="error-msg"></div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    

    <div style="position: fixed; bottom: 10px; left: 10px; font-size: 0.75rem; color: var(--text-muted); z-index: 1000; direction: ltr; text-align: left;">
        &copy; 2026 Human Intelligence &amp; Tech. All rights reserved. | <a href="legal.html" style="color:inherit; text-decoration:underline;">תנאים ומדיניות</a> | גרסה 1.1.6
    </div>
    <script src="app.js?v=1.1.20"></script>
</body>
</html>
